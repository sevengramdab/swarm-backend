<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplePod Status Dashboard</title>
    <style>
        /*
           Think of CSS like paint and wallpaper for a room.
           These rules make the dashboard look clean and cozy,
           like a well-organized control panel on the wall.
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            padding: 2rem;
        }

        .dashboard {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background-color: #313244;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 6px solid #89b4fa;
        }

        header h1 {
            font-size: 1.8rem;
            color: #cdd6f4;
        }

        header p {
            color: #a6adc8;
            margin-top: 0.25rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background-color: #313244;
            border-radius: 12px;
            padding: 1.5rem;
            border-left: 6px solid #a6e3a1;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card.warning {
            border-left-color: #f9e2af;
        }

        .card.danger {
            border-left-color: #f38ba8;
        }

        .card.info {
            border-left-color: #89b4fa;
        }

        .card.purple {
            border-left-color: #cba6f7;
        }

        .card-label {
            font-size: 0.9rem;
            color: #a6adc8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            color: #cdd6f4;
        }

        .card-value.online {
            color: #a6e3a1;
        }

        .card-value.warning {
            color: #f9e2af;
        }

        .card-value.danger {
            color: #f38ba8;
        }

        footer {
            text-align: center;
            color: #6c7086;
            font-size: 0.85rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!--
            This header is like the nameplate on the control room door.
            It tells Mom she's looking at the right house.
        -->
        <header>
            <h1>🏠 SimplePod Surgical Strike Swarm</h1>
            <p>Twilio Gateway Status Dashboard</p>
        </header>

        <!--
            These cards are like little Post-it notes on a whiteboard.
            Each one shows one important thing about the house.
        -->
        <div class="grid">
            <div class="card">
                <div class="card-label">Gateway</div>
                <div class="card-value online">ONLINE</div>
            </div>
            <div class="card">
                <div class="card-label">Active Agents</div>
                <div class="card-value online">14 / 14</div>
            </div>
            <div class="card">
                <div class="card-label">Connected Nodes</div>
                <div class="card-value online">3 / 3</div>
            </div>
            <div class="card warning">
                <div class="card-label">CPU Load</div>
                <div class="card-value warning">42%</div>
            </div>
            <div class="card info">
                <div class="card-label">Memory</div>
                <div class="card-value info">1.2 GB</div>
            </div>
            <div class="card purple">
                <div class="card-label">Uptime</div>
                <div class="card-value purple">3d 4h</div>
            </div>
        </div>

        <!--
            The footer is like a tiny signature at the bottom of a painting.
            It tells Mom who made this dashboard.
        -->
        <footer>
            Generated by AGENT-014 · Twilio MMS Gateway · SimplePod Swarm
        </footer>
    </div>
</body>
</html>
